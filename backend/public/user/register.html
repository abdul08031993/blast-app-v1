<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Register - Blast App</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h2>User Registration</h2>
      <form id="registerForm">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="input-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <button type="submit" class="btn-login">Register</button>
        <div id="message" class="error-message"></div>
      </form>
      <p style="text-align: center; margin-top: 20px;">
        <a href="index.html">Already have account? Login</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const userData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value
      };
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(userData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          document.getElementById('message').style.color = 'green';
          document.getElementById('message').textContent = 'Registration successful! Redirecting to login...';
          setTimeout(() => {
            window.location.href = '/user';
          }, 2000);
        } else {
          document.getElementById('message').textContent = data.error || 'Registration failed';
        }
      } catch (error) {
        document.getElementById('message').textContent = 'Connection error';
      }
    });
  </script>
</body>
</html>
